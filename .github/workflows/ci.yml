name: Pull request validation

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  validate:
    name: Validate and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run Pyright
        run: npx --yes pyright --project pyrightconfig.json

      - name: Run backend tests with coverage
        working-directory: backend
        run: >
          python -m pytest tests -m "not integration"
          --cov=app
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml:coverage.xml

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Confirm coverage reports
        shell: bash
        run: |
          test -f backend/coverage.xml
          test -f frontend/coverage/lcov.info

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=backend/app,frontend/src
            -Dsonar.tests=backend/tests
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.exclusions=**/coverage/**,**/node_modules/**,**/.venv/**,**/venv/**,**/.aws-sam/**,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,frontend/src/test/**,frontend/src/**/*.d.ts
            -Dsonar.qualitygate.wait=true
