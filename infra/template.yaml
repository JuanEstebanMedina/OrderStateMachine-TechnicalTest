AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Serverless backend deployment for the Order State Machine API.

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: API Gateway HTTP API stage name.
    AllowedPattern: "^[A-Za-z0-9_$-]+$"
  FrontendOrigins:
    Type: CommaDelimitedList
    Default: "http://localhost:5173"
    Description: Comma-separated browser origins allowed to call the API.

Globals:
  Function:
    Runtime: python3.14
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 15
    Tracing: Active

Resources:
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OrderHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowOrigins: !Ref FrontendOrigins
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        AllowCredentials: false

  OrderApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: app.lambda_handler.handler
      Environment:
        Variables:
          PERSISTENCE_BACKEND: dynamodb
          DYNAMODB_TABLE_NAME: !Ref OrdersTable
          CORS_ALLOWED_ORIGINS: !Join [",", !Ref FrontendOrigins]
          POWERTOOLS_SERVICE_NAME: order-state-machine-api
          POWERTOOLS_METRICS_NAMESPACE: OrderStateMachine
          POWERTOOLS_TRACER_CAPTURE_RESPONSE: "false"
          LOG_LEVEL: INFO
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt OrdersTable.Arn
                - !Sub "${OrdersTable.Arn}/index/GSI1"
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref OrderHttpApi
            Path: /
            Method: ANY
            PayloadFormatVersion: "2.0"
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref OrderHttpApi
            Path: /{proxy+}
            Method: ANY
            PayloadFormatVersion: "2.0"

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed HTTP API stage.
    Value: !Sub "https://${OrderHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}"
  LambdaFunctionName:
    Description: Name of the FastAPI Lambda function.
    Value: !Ref OrderApiFunction
  DynamoDBTableName:
    Description: Name of the generated DynamoDB table.
    Value: !Ref OrdersTable
  StackRegion:
    Description: AWS region where the stack is deployed.
    Value: !Ref AWS::Region
